name: Publicar GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows:
      - "Atualizar nível dos rios"
      - "Atualizar GuaibaNews"
      - "Atualizar ofertas dos mercados"
      - "Atualizar editais"
      - "Atualizar serviços"
      - "Atualizar Explorar"
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Atualizar nível dos rios antes do deploy
        continue-on-error: true
        run: |
          pip install requests
          python automation/fetch_rivers.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Enviar artefato do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
