name: Atualizar ofertas dos mercados

on:
  schedule:
    - cron: "0 */2 * * *" # a cada 2 horas
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 lxml Pillow

      - name: Executar scraping
        run: python automation/fetch_offers.py

      - run: python automation/gen_schedules.py

      - name: Publicar mudanças
        run: |
          git config user.name "guaiba-em-dia-bot"
          git config user.email "actions@github.com"
          git add ofertas.json ofertas-data.js assets/banners/ schedules-data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza ofertas [automático]"
          git push
