name: Atualizar Guibanews

on:
  schedule:
    - cron: "0 */2 * * *" # a cada 2 horas
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar notícias
        run: python automation/fetch_news.py

      - run: python automation/gen_schedules.py

      - name: Publicar mudanças
        run: |
          git config user.name "guaiba-em-dia-bot"
          git config user.email "actions@github.com"
          git add noticias.json noticias-data.js noticias.rss schedules-data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza Guibanews [automático]"
          git push
