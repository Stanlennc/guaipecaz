name: Atualizar serviços

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-servicos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4 lxml
      - run: python automation/fetch_servicos.py
      - run: |
          git config user.name "guaiba-em-dia-bot"
          git config user.email "actions@github.com"
          git add servicos.json servicos-data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza serviços [automático]"
          git push
