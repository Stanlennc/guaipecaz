name: Atualizar nível dos rios

on:
  schedule:
    # Evita :00 (fila do GitHub); tenta a cada ~15 min
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}
  # Backup: quando ofertas ou notícias atualizam (cron de 2h mais confiável no GitHub)
  workflow_run:
    workflows:
      - "Atualizar ofertas dos mercados"
      - "Atualizar Guibanews"
    types: [completed]

permissions:
  contents: write

concurrency:
  group: update-rivers
  cancel-in-progress: false

jobs:
  update-rivers:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar dados dos rios
        env:
          ANA_API_USER: ${{ secrets.ANA_API_USER }}
          ANA_API_PASSWORD: ${{ secrets.ANA_API_PASSWORD }}
        run: python automation/fetch_rivers.py

      - run: python automation/gen_schedules.py

      - name: Publicar mudanças
        run: |
          git config user.name "guaiba-em-dia-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add rivers.json rivers-data.js schedules-data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza nível dos rios [automático]"
          git push
